name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          ndk-version: 27.1.12297006

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build happy-wire
        run: pnpm --filter @slopus/happy-wire build

      - name: Expo prebuild (Android)
        working-directory: packages/happy-app
        env:
          APP_ENV: preview
        run: pnpm exec expo prebuild --platform android --non-interactive

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('pnpm-lock.yaml', 'packages/happy-app/app.config.js') }}
          restore-keys: gradle-

      - name: Generate throwaway signing keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Test, O=Test, C=US"

      - name: Build release APK
        working-directory: packages/happy-app/android
        env:
          APP_ENV: preview
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: packages/happy-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
